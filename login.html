<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – CephasGM VPN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-primary { background: linear-gradient(90deg, #3b82f6, #8b5cf6); }
    </style>
</head>
<body class="gradient-bg text-white font-sans min-h-screen flex items-center justify-center p-4">
    <div class="glass-card rounded-2xl p-8 w-full max-w-md">
        <div class="text-center mb-6">
            <i class="fas fa-lock text-4xl text-blue-500"></i>
            <h1 class="text-2xl font-bold mt-2">Welcome Back</h1>
            <p class="text-gray-400 text-sm">Login to access your VPN</p>
        </div>
        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-sm mb-1">Email</label>
                <input type="email" id="email" class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none focus:border-blue-500" required>
            </div>
            <div class="mb-6">
                <label class="block text-sm mb-1">Password</label>
                <input type="password" id="password" class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none focus:border-blue-500" required>
            </div>
            <button type="submit" class="w-full btn-primary py-3 rounded-lg font-semibold">Login</button>
        </form>
        <p class="text-center text-gray-400 text-sm mt-6">No account? <a href="signup.html" class="text-blue-400 hover:underline">Sign up</a></p>
        <div id="message" class="mt-4 text-center text-sm hidden"></div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('message');
            try {
                const res = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    msgDiv.className = 'mt-4 text-center text-sm text-green-400';
                    msgDiv.innerText = 'Login successful! Redirecting...';
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else {
                    msgDiv.className = 'mt-4 text-center text-sm text-red-400';
                    msgDiv.innerText = data.error || 'Invalid credentials';
                }
            } catch (err) {
                msgDiv.className = 'mt-4 text-center text-sm text-red-400';
                msgDiv.innerText = 'Backend not reachable.';
            }
        });
    </script>
</body>
</html>
