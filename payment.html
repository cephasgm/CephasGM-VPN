<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment – CephasGM VPN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="gradient-bg text-white font-sans min-h-screen flex items-center justify-center p-4">
    <div class="glass-card rounded-2xl p-8 w-full max-w-md">
        <h1 class="text-2xl font-bold text-center">Payment Details</h1>
        <p class="text-gray-400 text-center text-sm mb-6">Secure payment – no logs stored</p>
        <form id="paymentForm">
            <div class="mb-4">
                <label class="block text-sm">Card Number</label>
                <input type="text" placeholder="4242 4242 4242 4242" class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700">
            </div>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm">Expiry</label>
                    <input type="text" placeholder="MM/YY" class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700">
                </div>
                <div>
                    <label class="block text-sm">CVC</label>
                    <input type="text" placeholder="123" class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700">
                </div>
            </div>
            <div class="mb-6">
                <label class="block text-sm">Name on Card</label>
                <input type="text" class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700">
            </div>
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 py-3 rounded-lg font-semibold">Pay & Activate VPN</button>
        </form>
        <div class="text-center mt-6">
            <p class="text-xs text-gray-500"><i class="fab fa-bitcoin"></i> Also accept crypto: <a href="#" class="text-blue-400">Pay with BTC/ETH</a></p>
        </div>
        <div id="message" class="mt-4 text-center text-sm hidden"></div>
    </div>
    <script>
        document.getElementById('paymentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('message');
            msgDiv.className = 'mt-4 text-center text-sm text-green-400';
            msgDiv.innerText = 'Payment simulated! Redirecting to dashboard...';
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
        });
    </script>
</body>
</html>
