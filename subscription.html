<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Plan – CephasGM VPN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .plan-card { transition: transform 0.2s; cursor: pointer; }
        .plan-card:hover { transform: scale(1.02); background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="gradient-bg text-white font-sans min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold">Choose your subscription</h1>
            <p class="text-gray-400 mt-2">Upgrade anytime or cancel with one click.</p>
        </div>
        <div class="grid md:grid-cols-2 gap-6">
            <div class="glass-card rounded-2xl p-6 plan-card" data-plan="monthly">
                <h2 class="text-2xl font-bold">Monthly</h2>
                <div class="text-4xl font-extrabold mt-2">$9.99<span class="text-lg">/mo</span></div>
                <ul class="mt-4 space-y-2 text-sm">
                    <li><i class="fas fa-check text-green-400"></i> Unlimited bandwidth</li>
                    <li><i class="fas fa-check text-green-400"></i> 5 devices</li>
                    <li><i class="fas fa-check text-green-400"></i> All server locations</li>
                </ul>
                <button class="mt-6 w-full bg-blue-600 py-2 rounded-lg">Select Monthly</button>
            </div>
            <div class="glass-card rounded-2xl p-6 plan-card border border-blue-500" data-plan="yearly">
                <div class="absolute -mt-8 ml-4 bg-blue-600 px-3 py-1 rounded-full text-xs">Save 40%</div>
                <h2 class="text-2xl font-bold">Yearly</h2>
                <div class="text-4xl font-extrabold mt-2">$5.99<span class="text-lg">/mo</span></div>
                <div class="text-sm text-gray-400">billed $71.88 annually</div>
                <ul class="mt-4 space-y-2 text-sm">
                    <li><i class="fas fa-check text-green-400"></i> Everything in Monthly</li>
                    <li><i class="fas fa-check text-green-400"></i> 10 devices</li>
                    <li><i class="fas fa-check text-green-400"></i> Priority support</li>
                </ul>
                <button class="mt-6 w-full bg-gradient-to-r from-blue-600 to-purple-600 py-2 rounded-lg">Select Yearly</button>
            </div>
        </div>
        <div class="text-center mt-8">
            <a href="index.html" class="text-gray-400 hover:text-white">← Back to home</a>
        </div>
    </div>
    <script>
        document.querySelectorAll('.plan-card button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const plan = btn.closest('.plan-card').dataset.plan;
                localStorage.setItem('selectedPlan', plan);
                window.location.href = 'payment.html';
            });
        });
    </script>
</body>
</html>
